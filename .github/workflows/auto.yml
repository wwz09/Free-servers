name: Auto-update

on:
  schedule:
    - cron:  '0 */2 * * *'  # 每2小时执行一次
  workflow_dispatch:      # 允许手动触发

# 授予工作流必要的权限
permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取所有历史记录
          persist-credentials: true  # 保持凭据以便后续操作

      - name: Set up Git
        run: |
          git config --global user.name "wwz09"
          git config --global user.email "wwz5124@gmail.com"

      - name: Add upstream remote
        run: git remote add upstream "https://github.com/Pawdroid/Free-servers.git" || echo "Upstream remote already exists"

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream changes (兼容无关联历史)
        run: |
          git checkout main
          # 添加 --allow-unrelated-histories 解决无关联历史报错
          git merge --no-edit --allow-unrelated-histories upstream/main || (
            echo "检测到冲突，使用上游文件全部覆盖"
            git checkout --theirs .
            git add .
            # 仅当存在变更时才提交，无变更直接退出不报错
            if [[ -n "$(git status --porcelain)" ]]; then
              git commit -m "自动解决上游同步冲突，全量采用上游文件"
            else
              echo "无文件变更，跳过提交"
              exit 0
            fi
          )

      - name: Push changes
        run: |
          git push origin main || (
            echo "推送失败，拉取本地最新并重试"
            git pull --rebase origin main
            git push origin main
          )

      - name: 触发URL替换工作流
        run: |
          echo "触发URL替换工作流..."
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"sync_upstream"}'
